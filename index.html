<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>정기관측회 신청</title>
<style>
  :root{
    --bg:#0a0e1a; --bg2:#111a2e; --card:rgba(20,28,48,.72);
    --line:rgba(120,150,220,.18); --txt:#e8edf7; --muted:#9aa7c7;
    --accent:#6ea8ff; --accent2:#a98bff; --ok:#46d6a0; --warn:#ffd36e; --bad:#ff7a7a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    color:var(--txt);
    background:radial-gradient(120% 120% at 50% -10%,#16213f 0%,#0a0e1a 55%);
    min-height:100%; overflow-x:hidden;
  }
  #stars,#stars2,#stars3{position:fixed;inset:0;pointer-events:none}
  .wrap{max-width:560px;margin:0 auto;padding:32px 20px 64px;position:relative;z-index:2}
  .badge{display:inline-block;font-size:12px;letter-spacing:.18em;color:var(--accent);
    border:1px solid var(--line);padding:6px 12px;border-radius:999px;background:rgba(110,168,255,.08)}
  h1{font-size:30px;line-height:1.25;margin:18px 0 6px;font-weight:800;
    background:linear-gradient(90deg,#cfe0ff,#b9a7ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:15px;margin:0 0 24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;margin:16px 0;backdrop-filter:blur(8px);box-shadow:0 8px 40px rgba(0,0,0,.35)}
  .info-row{display:flex;gap:10px;font-size:15px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .info-row:last-child{border-bottom:0}
  .info-row .k{color:var(--muted);min-width:64px}
  .info-row .v{color:var(--txt);font-weight:600}

  .count-label{color:var(--muted);font-size:13px;letter-spacing:.1em;text-align:center;margin-bottom:14px}
  .count{display:flex;justify-content:center;gap:10px}
  .seg{flex:1;max-width:84px;background:rgba(10,16,32,.6);border:1px solid var(--line);
    border-radius:14px;padding:14px 6px;text-align:center}
  .seg .n{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;color:#dfe8ff}
  .seg .u{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.05em}

  .cap{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px}
  .cap .label{font-size:14px;color:var(--muted)}
  .cap .val{font-size:14px;font-weight:700}
  .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%}

  label{display:block;font-size:14px;color:var(--muted);margin:14px 0 6px}
  input{width:100%;padding:13px 14px;font-size:16px;color:var(--txt);
    background:rgba(10,16,32,.6);border:1px solid var(--line);border-radius:12px;outline:none}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,168,255,.15)}
  .btn{width:100%;margin-top:20px;padding:15px;font-size:17px;font-weight:800;color:#08101f;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border:0;border-radius:14px;cursor:pointer;
    transition:transform .08s, filter .2s}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{filter:grayscale(.6) brightness(.7);cursor:not-allowed}

  .msg{margin-top:14px;padding:12px 14px;border-radius:12px;font-size:14px;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(70,214,160,.12);border:1px solid rgba(70,214,160,.4);color:#bff3df}
  .msg.warn{background:rgba(255,211,110,.12);border:1px solid rgba(255,211,110,.4);color:#ffe9b8}
  .msg.bad{background:rgba(255,122,122,.12);border:1px solid rgba(255,122,122,.4);color:#ffd2d2}

  .center{text-align:center}
  .hint{color:var(--muted);font-size:13px;text-align:center;margin-top:18px;line-height:1.6}
  .full-banner{text-align:center;padding:30px 10px}
  .full-banner .big{font-size:22px;font-weight:800;margin-bottom:6px}
  .hidden{display:none !important}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#08101f;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
  a.link{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="wrap">

  <div class="center">
    <span class="badge">★ 정기관측회</span>
    <h1 id="evtTitle">정기관측회 신청</h1>
    <p class="sub" id="evtTagline">밤하늘 아래에서 만나요</p>
  </div>

  <!-- 관측회 정보 -->
  <div class="card">
    <div class="info-row"><span class="k">📅 일시</span><span class="v" id="evtDate">-</span></div>
    <div class="info-row"><span class="k">📍 장소</span><span class="v" id="evtPlace">-</span></div>
    <div class="info-row"><span class="k">👥 정원</span><span class="v" id="evtCap">-</span></div>
  </div>

  <!-- 상태에 따라 바뀌는 영역 -->
  <div class="card" id="stateCard">
    <div id="loadingState" class="center" style="padding:20px 0">
      <span class="spin"></span> <span style="color:var(--muted)">불러오는 중…</span>
    </div>

    <!-- 오픈 전: 카운트다운 -->
    <div id="beforeState" class="hidden">
      <div class="count-label">신청 시작까지</div>
      <div class="count">
        <div class="seg"><div class="n" id="cd">00</div><div class="u">일</div></div>
        <div class="seg"><div class="n" id="ch">00</div><div class="u">시간</div></div>
        <div class="seg"><div class="n" id="cm">00</div><div class="u">분</div></div>
        <div class="seg"><div class="n" id="cs">00</div><div class="u">초</div></div>
      </div>
      <p class="hint" id="openAtText">-</p>
    </div>

    <!-- 오픈 후: 신청 폼 -->
    <div id="openState" class="hidden">
      <div class="cap">
        <span class="label">신청 현황</span>
        <span class="val" id="capText">- / -</span>
      </div>
      <div class="bar"><i id="capBar"></i></div>

      <form id="form" autocomplete="off">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" placeholder="홍길동" maxlength="20" required />
        <label for="sid">학번</label>
        <input id="sid" name="sid" type="text" inputmode="numeric" placeholder="20251234" maxlength="20" required />
        <button class="btn" id="submitBtn" type="submit">신청하기</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>

    <!-- 마감 -->
    <div id="fullState" class="hidden full-banner">
      <div class="big">🌑 신청이 마감되었습니다</div>
      <div style="color:var(--muted)">정원이 모두 찼어요. 다음 관측회에서 만나요!</div>
    </div>

    <!-- 종료(마감시각 지남) -->
    <div id="closedState" class="hidden full-banner">
      <div class="big">신청이 종료되었습니다</div>
      <div style="color:var(--muted)">접수 기간이 지났어요.</div>
    </div>
  </div>

  <p class="hint">문의는 동아리 운영진에게 연락해 주세요.</p>
</div>

<script>
/* =========================================================================
   설정 (CONFIG) — 이 부분만 바꾸면 됩니다
   ========================================================================= */
const CONFIG = {
  title:   "1차 정기관측회 신청",
  tagline: "페르세우스의 별빛 아래에서",
  date:    "2026년 9월 28일 (토)",
  place:   "윤호네 집",

  API_URL: "https://script.google.com/macros/s/AKfycbzKblqEmZSMGShChP7gDwFWHiuWtnBwAirCC_R6ke2v-3-nWpdWY9UhU_O_mhsqLJPUAw/exec",

  demoOpenTime: "2026-09-20T18:00:00+09:00",
  demoCapacity: 50
};
/* ===================== 설정 끝 ===================== */

const $ = id => document.getElementById(id);
let state = { openTime:null, closeTime:null, capacity:0, count:0, serverNow:0, baseTick:0 };
const usingApi = CONFIG.API_URL && CONFIG.API_URL.startsWith("http");

$("evtTitle").textContent = CONFIG.title;
$("evtTagline").textContent = CONFIG.tagline;
$("evtDate").textContent = CONFIG.date;
$("evtPlace").textContent = CONFIG.place;
document.title = CONFIG.title;

function fmtKST(ms){
  try{
    return new Date(ms).toLocaleString("ko-KR",{timeZone:"Asia/Seoul",
      month:"long",day:"numeric",hour:"2-digit",minute:"2-digit",weekday:"short"});
  }catch(e){ return new Date(ms).toLocaleString("ko-KR"); }
}
function show(which){
  ["loadingState","beforeState","openState","fullState","closedState"]
    .forEach(s=>$(s).classList.add("hidden"));
  $(which).classList.remove("hidden");
}
function serverNow(){ return state.serverNow + (Date.now() - state.baseTick); }
function pad(n){ return String(n).padStart(2,"0"); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Apps Script 는 브라우저의 일반 fetch 응답을 막으므로(CORS),
// 읽기(상태/결과 조회)는 JSONP 로 처리한다. (개인정보는 URL 에 싣지 않음)
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    const timer = setTimeout(()=>{ cleanup(); reject(new Error("timeout")); }, 8000);
    function cleanup(){ try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); }
    window[cb] = (data)=>{ cleanup(); resolve(data); };
    const q = Object.keys(params).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(params[k])).join("&");
    s.src = CONFIG.API_URL + "?" + q + "&callback=" + cb + "&t=" + Date.now();
    s.onerror = ()=>{ cleanup(); reject(new Error("network")); };
    document.head.appendChild(s);
  });
}

async function loadStatus(){
  if(usingApi){
    try{
      const d = await jsonp({ action: "status" });
      state.openTime  = d.openTime;
      state.closeTime = d.closeTime || null;
      state.capacity  = d.capacity;
      state.count     = d.count;
      state.serverNow = d.serverNow;
      state.baseTick  = Date.now();
    }catch(e){
      demoState();
    }
  }else{
    demoState();
  }
  $("evtCap").textContent = state.capacity + "명";
  render();
}
function demoState(){
  state.openTime  = new Date(CONFIG.demoOpenTime).getTime();
  state.closeTime = null;
  state.capacity  = CONFIG.demoCapacity;
  state.count     = state.count || 0;
  state.serverNow = Date.now();
  state.baseTick  = Date.now();
}

function render(){
  const now = serverNow();
  const remaining = state.capacity - state.count;
  if(now < state.openTime){
    show("beforeState");
    $("openAtText").textContent = "오픈: " + fmtKST(state.openTime);
    return;
  }
  if(state.closeTime && now > state.closeTime){ show("closedState"); return; }
  if(remaining <= 0){ show("fullState"); return; }
  show("openState");
  $("capText").textContent = state.count + " / " + state.capacity + "명";
  $("capBar").style.width = Math.min(100, state.count/state.capacity*100) + "%";
}

setInterval(()=>{
  if(!state.openTime) return;
  const now = serverNow();
  if(now < state.openTime){
    let diff = Math.floor((state.openTime - now)/1000);
    const d = Math.floor(diff/86400); diff%=86400;
    const h = Math.floor(diff/3600);  diff%=3600;
    const m = Math.floor(diff/60);    const s = diff%60;
    $("cd").textContent=pad(d); $("ch").textContent=pad(h);
    $("cm").textContent=pad(m); $("cs").textContent=pad(s);
    if(d===0&&h===0&&m===0&&s<=1){ setTimeout(loadStatus, 1200); }
  }
},1000);

setInterval(()=>{ if(usingApi) loadStatus(); }, 20000);

$("form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const name = $("name").value.trim();
  const sid  = $("sid").value.trim();
  $("msg").className="msg";
  if(!name || !sid){ flash("warn","이름과 학번을 모두 입력해 주세요."); return; }
  if(!/^[0-9]{4,15}$/.test(sid)){ flash("warn","학번은 숫자로 입력해 주세요."); return; }

  const btn = $("submitBtn");
  btn.disabled = true; const old = btn.innerHTML;
  btn.innerHTML = '<span class="spin"></span> 신청 중…';

  if(!usingApi){
    setTimeout(()=>{
      state.count++;
      flash("ok","✅ ["+name+"] 신청 완료! (데모 모드 — 서버 미연결)");
      btn.innerHTML=old; render();
    },700);
    return;
  }

  try{
    // 개인정보(이름·학번)는 URL 이 아니라 요청 본문으로 전송 (no-cors POST)
    const token = "tk_" + Math.random().toString(36).slice(2) + Date.now();
    await fetch(CONFIG.API_URL, {
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action:"apply", name, sid, token})
    });
    // 처리 결과는 토큰으로 조회 (JSONP, 개인정보 미포함)
    let d = null;
    for(let i=0;i<12;i++){
      await sleep(700);
      try{
        const res = await jsonp({ action:"result", token });
        if(res && res.status && res.status!=="pending"){ d = res; break; }
      }catch(e){}
    }
    if(!d){ throw new Error("no-result"); }

    btn.innerHTML = old;
    if(d.status==="ok"){
      flash("ok","✅ "+name+"님, 신청이 완료되었습니다! ("+d.count+"/"+d.capacity+")");
      state.count=d.count; state.capacity=d.capacity;
      $("form").reset(); render();
      if(d.count>=d.capacity){ setTimeout(()=>show("fullState"),1500); }
    }else if(d.status==="duplicate"){
      flash("warn","이미 신청된 학번입니다. (중복 신청 불가)"); btn.disabled=false;
    }else if(d.status==="full"){
      flash("bad","아쉽지만 정원이 모두 찼습니다."); setTimeout(()=>show("fullState"),1200);
    }else if(d.status==="notopen"){
      flash("warn","아직 신청 시작 전입니다."); btn.disabled=false; loadStatus();
    }else if(d.status==="closed"){
      flash("bad","신청이 종료되었습니다."); setTimeout(()=>show("closedState"),1000);
    }else{
      flash("bad","신청 정보를 확인해 주세요."); btn.disabled=false;
    }
  }catch(err){
    btn.innerHTML=old; btn.disabled=false;
    flash("bad","일시적인 오류가 발생했어요. 잠시 후 다시 시도해 주세요.");
  }
});
function flash(type,text){
  const m=$("msg"); m.className="msg show "+type; m.textContent=text;
}

loadStatus();

/* ===== 배경 별 ===== */
(function(){
  const c=$("sky"), x=c.getContext("2d"); let w,h,stars;
  function init(){
    w=c.width=innerWidth; h=c.height=innerHeight;
    stars=Array.from({length:140},()=>({x:Math.random()*w,y:Math.random()*h,
      r:Math.random()*1.4+.3, a:Math.random(), s:Math.random()*.02+.005}));
  }
  function loop(){
    x.clearRect(0,0,w,h);
    for(const st of stars){
      st.a+=st.s; if(st.a>1||st.a<0) st.s*=-1;
      x.beginPath(); x.arc(st.x,st.y,st.r,0,7);
      x.fillStyle="rgba(200,215,255,"+Math.abs(st.a)+")"; x.fill();
    }
    requestAnimationFrame(loop);
  }
  c.style.cssText="position:fixed;inset:0;z-index:0";
  addEventListener("resize",init); init(); loop();
})();
</script>
</body>
</html>
